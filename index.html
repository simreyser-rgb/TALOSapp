<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TALOS iOS Terminal</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --ios-blue: #007AFF; --ios-bg: #F2F2F7; }
        body { background-color: var(--ios-bg); font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 20px 16px; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
        .balance { background: #fff; padding: 8px 12px; border-radius: 20px; font-weight: 700; color: var(--ios-blue); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        #chart-wrapper { flex-grow: 1; margin: 12px; border-radius: 20px; overflow: hidden; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .footer { padding: 16px 16px 34px; display: flex; gap: 12px; background: #fff; border-top: 0.5px solid rgba(0,0,0,0.1); }
        .btn { flex: 1; height: 52px; border: none; border-radius: 14px; font-size: 17px; font-weight: 600; cursor: pointer; transition: 0.2s; color: #fff; }
        .btn-buy { background: #34C759; }
        .btn-sell { background: #FF3B30; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
    </style>
</head>
<body>

<div class="header">
    <h1 id="asset-title">TALOS</h1>
    <div class="balance">$10,000.00</div>
</div>

<div id="chart-wrapper">
    <!-- Контейнер для графика -->
    <div id="tradingview_widget" style="height: 100%;"></div>
</div>

<div class="footer">
    <button class="btn btn-buy" onclick="trade('BUY')">Купить</button>
    <button class="btn btn-sell" onclick="trade('SELL')">Продать</button>
</div>

<!-- Важно: подключаем скрипт графиков -->
<script type="text/javascript" src="https://tradingview.com"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    const rawSymbol = params.get('symbol') || 'BTC';
    document.getElementById('asset-title').innerText = rawSymbol;

    // Логика определения биржи (чтобы графики не ломались)
    let fullSymbol = rawSymbol;
    const moex = ["SBER", "GAZP", "YNDX", "LKOH", "ALRS", "GMKN", "TCSG", "FLOT"];
    const crypto = ["BTC", "ETH", "SOL", "DOGE"];

    if (moex.includes(rawSymbol)) {
        fullSymbol = "MOEX:" + rawSymbol;
    } else if (crypto.some(c => rawSymbol.includes(c))) {
        fullSymbol = "BINANCE:" + rawSymbol + (rawSymbol.includes("USDT") ? "" : "USDT");
    } else {
        fullSymbol = "NASDAQ:" + rawSymbol;
    }

    // Запуск графика
    new TradingView.widget({
        "autosize": true,
        "symbol": fullSymbol,
        "interval": "60",
        "timezone": "Etc/UTC",
        "theme": "light",
        "style": "1",
        "locale": "ru",
        "toolbar_bg": "#f1f3f6",
        "enable_publishing": false,
        "hide_top_toolbar": true,
        "container_id": "tradingview_widget"
    });

    function trade(type) {
        tg.HapticFeedback.impactOccurred('medium');
        tg.showConfirm(`Подтвердить ${type === 'BUY' ? 'покупку' : 'продажу'} ${rawSymbol}?`, (ok) => {
            if(ok) tg.sendData(JSON.stringify({action: type, asset: rawSymbol}));
        });
    }
</script>
</body>
</html>
