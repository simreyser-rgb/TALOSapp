<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Подключаем скрипты в самом начале -->
    <script src="https://telegram.org"></script>
    <script type="text/javascript" src="https://tradingview.com"></script>
    <style>
        body { background: #F2F2F7; font-family: -apple-system, sans-serif; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px; background: #fff; border-bottom: 0.5px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
        #chart { flex-grow: 1; margin: 10px; border-radius: 15px; overflow: hidden; background: #fff; }
        .footer { padding: 15px 15px 35px; display: flex; gap: 10px; background: #fff; }
        .btn { flex: 1; height: 50px; border: none; border-radius: 12px; font-weight: bold; color: #fff; font-size: 16px; }
    </style>
</head>
<body>
    <div class="header">
        <div id="name" style="font-weight: bold;">TALOS</div>
        <div style="color: #007AFF;">$10,000</div>
    </div>
    <div id="chart"><div id="tv" style="height: 100%;"></div></div>
    <div class="footer">
        <button class="btn" style="background: #34C759;" onclick="tg.showAlert('Куплено!')">КУПИТЬ</button>
        <button class="btn" style="background: #FF3B30;" onclick="tg.showAlert('Продано!')">ПРОДАТЬ</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready(); // Сообщаем Телеграму, что мы готовы

        const params = new URLSearchParams(window.location.search);
        const sym = params.get('symbol') || 'BINANCE:BTCUSDT';
        
        // Рисуем график
        try {
            new TradingView.widget({
                "autosize": true,
                "symbol": sym,
                "interval": "60",
                "theme": "light",
                "style": "1",
                "locale": "ru",
                "container_id": "tv",
                "hide_top_toolbar": true
            });
        } catch(e) {
            console.log("Ошибка графика:", e);
        }
    </script>
</body>
</html>
