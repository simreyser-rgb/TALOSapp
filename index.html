<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <script type="text/javascript" src="https://tradingview.com"></script>
    <style>
        body { background: #F2F2F7; font-family: -apple-system, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 15px; background: #fff; border-bottom: 0.5px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
        #chart { flex-grow: 1; margin: 10px; border-radius: 15px; overflow: hidden; background: #fff; border: 1px solid #ddd; }
        .footer { padding: 15px 15px 35px; display: flex; gap: 10px; background: #fff; }
        .btn { flex: 1; height: 50px; border: none; border-radius: 12px; font-weight: bold; color: #fff; font-size: 16px; }
    </style>
</head>
<body>
    <div class="header">
        <div id="u-name" style="font-weight: bold;">TALOS USER</div>
        <div style="color: #007AFF; font-weight: bold;">$10,000</div>
    </div>
    <div id="chart"><div id="tv" style="height: 100%;"></div></div>
    <div class="footer">
        <button class="btn" style="background: #34C759;" onclick="window.Telegram.WebApp.showAlert('Сделка открыта!')">КУПИТЬ</button>
        <button class="btn" style="background: #FF3B30;" onclick="window.Telegram.WebApp.close()">ЗАКРЫТЬ</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); // ЭТО САМАЯ ВАЖНАЯ СТРОКА
        tg.expand();

        const params = new URLSearchParams(window.location.search);
        const sym = params.get('symbol') || 'BINANCE:BTCUSDT';
        
        if (tg.initDataUnsafe?.user) {
            document.getElementById('u-name').innerText = tg.initDataUnsafe.user.first_name;
        }

        new TradingView.widget({
            "autosize": true,
            "symbol": sym,
            "interval": "60",
            "theme": "light",
            "style": "1",
            "locale": "ru",
            "container_id": "tv",
            "hide_top_toolbar": true
        });
    </script>
</body>
</html>
